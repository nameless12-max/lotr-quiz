<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Daily Quest · A Chronicle of Middle Lore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0805;
  --ink-2: #110c07;
  --card: #1a140c;
  --card-edge: #2a2014;
  --parchment: #ead7ac;
  --parchment-2: #d8c08a;
  --parchment-dim: #9b8867;
  --parchment-faint: #5c5040;
  --gold: #c9a14a;
  --gold-deep: #8a6d2b;
  --gold-bright: #f0d489;
  --crimson: #a83828;
  --crimson-glow: #e0604d;
  --forest: #4a8a48;
  --forest-glow: #8edc8a;
  --ember: #f5a851;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: var(--ink); }
body {
  font-family: 'IM Fell English', 'Iowan Old Style', Georgia, serif;
  color: var(--parchment);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0 16px;
  background:
    radial-gradient(ellipse at 50% 15%, rgba(201,161,74,0.10), transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(168,56,40,0.07), transparent 60%),
    var(--ink);
  position: relative;
  overflow-x: hidden;
}

/* ─── Atmospheric layers (fixed, behind everything) ─── */
/* cinematic background photo — Fellowship marching, sits below everything */
.bg-photo {
  position: fixed; inset: 0; pointer-events: none; z-index: -1;
  background-image: url("./bg-fellowship.jpg");
  background-size: cover;
  background-position: center 30%;
  background-repeat: no-repeat;
  /* very dim + slightly blurred so it's atmosphere, not a distraction */
  opacity: 0.22;
  filter: blur(2px) saturate(0.7) brightness(0.65);
}
/* ink vignette over the photo so the centre is darker and edges fade further */
.bg-vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(10,8,5,0.35), rgba(10,8,5,0.85) 70%, rgba(10,8,5,0.97) 100%);
}
/* parchment-noise grain */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.79  0 0 0 0 0.63  0 0 0 0 0.29  0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.55; mix-blend-mode: screen;
}

/* far-distant mountain silhouette fixed across bottom of viewport */
.skyline {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 200vw;
  max-width: 2400px;
  height: 280px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.85;
}
.skyline svg { width: 100%; height: 100%; display: block; }

/* starfield */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.7; }
.star { position: absolute; width: 2px; height: 2px; background: var(--parchment-2); border-radius: 50%; box-shadow: 0 0 6px rgba(234,215,172,0.7); }
.star.s { width: 1px; height: 1px; box-shadow: 0 0 3px rgba(234,215,172,0.5); }
.star.t { animation: twinkle 4s ease-in-out infinite; }
@keyframes twinkle { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* drifting embers */
.embers { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.ember {
  position: absolute;
  bottom: -10px;
  width: 3px; height: 3px;
  background: var(--ember);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(245,168,81,0.7), 0 0 16px rgba(245,168,81,0.3);
  animation: rise linear infinite;
  opacity: 0;
}
@keyframes rise {
  0%   { transform: translate(0, 0)        scale(0.4); opacity: 0; }
  8%   { opacity: 0.9; }
  50%  { transform: translate(15px, -45vh) scale(1);   opacity: 0.7; }
  85%  { opacity: 0.4; }
  100% { transform: translate(-10px, -95vh) scale(0.5); opacity: 0; }
}

.wrap { width: 100%; max-width: 540px; padding: 1.5rem 0 3rem; position: relative; z-index: 2; }

/* ─── Hero landscape (in-flow, top of welcome screen) ─── */
.hero {
  position: relative;
  height: 220px;
  margin: 0 -8px 12px;
  overflow: hidden;
  border-radius: 2px;
  box-shadow: inset 0 -30px 60px rgba(10,8,5,0.9), inset 0 0 0 1px rgba(138,109,43,0.35);
}
.hero svg { width: 100%; height: 100%; display: block; }
.hero-seal {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 120px; height: 120px;
  filter: drop-shadow(0 0 24px rgba(240,212,137,0.5));
  animation: sealPulse 5s ease-in-out infinite;
}
@keyframes sealPulse {
  0%,100% { filter: drop-shadow(0 0 22px rgba(240,212,137,0.45)); }
  50%     { filter: drop-shadow(0 0 38px rgba(240,212,137,0.75)); }
}

/* ─── Titles ─── */
.title-block { text-align: center; margin-bottom: 22px; }
h1 {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--gold-bright);
  text-transform: uppercase;
  margin-bottom: 8px;
  text-shadow: 0 0 28px rgba(240,212,137,0.25), 0 2px 0 rgba(0,0,0,0.5);
}
.sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--parchment-dim);
  letter-spacing: 0.04em;
  line-height: 1.5;
  padding: 0 12px;
}

/* ─── Ornamental divider ─── */
.flourish { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 22px auto 24px; max-width: 380px; opacity: 0.95; }
.flourish-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-deep) 30%, var(--gold) 50%, var(--gold-deep) 70%, transparent); }
.flourish svg { display: block; flex-shrink: 0; }

/* ─── Cards ─── */
.card {
  background:
    linear-gradient(180deg, rgba(28,22,16,0.88) 0%, rgba(20,15,9,0.95) 100%);
  border: 1px solid var(--card-edge);
  border-radius: 3px;
  padding: 1.75rem 1.5rem;
  margin-bottom: 14px;
  position: relative;
  box-shadow:
    inset 0 1px 0 rgba(201,161,74,0.10),
    inset 0 0 40px rgba(0,0,0,0.45),
    0 12px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
/* gold L-bracket corners on every card */
.card::before, .card::after,
.card .corner-tr, .card .corner-bl {
  content: ""; position: absolute; width: 16px; height: 16px;
  border: 1px solid var(--gold-deep);
  pointer-events: none;
}
.card::before { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
.card::after  { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }
.card .corner-tr { top: 6px; right: 6px; border-left: 0; border-bottom: 0; }
.card .corner-bl { bottom: 6px; left: 6px; border-right: 0; border-top: 0; }
/* top-centre ornament on cards */
.card-crown {
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  background: var(--ink);
  padding: 0 10px;
  line-height: 0;
  color: var(--gold);
}

/* ─── Inputs ─── */
label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.28em;
  color: var(--parchment-dim);
  display: block;
  margin-bottom: 12px;
  text-transform: uppercase;
  text-align: center;
}
input[type=text] {
  width: 100%;
  padding: 13px 16px;
  font-family: 'IM Fell English', serif;
  font-size: 18px;
  border: 1px solid #3a2e1a;
  border-radius: 3px;
  background: #0c0805;
  color: var(--parchment);
  outline: none;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  text-align: center;
}
input[type=text]::placeholder { color: var(--parchment-faint); font-style: italic; }
input[type=text]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold), 0 0 22px rgba(201,161,74,0.2);
}

/* ─── Buttons ─── */
.btn {
  width: 100%;
  padding: 14px 18px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.30em;
  text-transform: uppercase;
  border: 1px solid var(--gold);
  border-radius: 3px;
  background: linear-gradient(180deg, rgba(201,161,74,0.04), rgba(201,161,74,0.10));
  color: var(--gold-bright);
  cursor: pointer;
  margin-top: 18px;
  transition: all 0.2s;
  position: relative;
}
.btn:hover {
  background: linear-gradient(180deg, rgba(201,161,74,0.10), rgba(201,161,74,0.20));
  box-shadow: 0 0 28px rgba(201,161,74,0.25);
  text-shadow: 0 0 12px rgba(240,212,137,0.5);
}
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-ornament { display: inline-block; margin: 0 10px; color: var(--gold); opacity: 0.85; }

.hint { font-style: italic; font-size: 13px; color: var(--parchment-faint); text-align: center; margin-top: 14px; line-height: 1.5; }
.err { font-size: 13px; color: var(--crimson-glow); margin-top: 12px; font-style: italic; text-align: center; }

/* ─── Hero dropzone overlay ─── */
.hero { cursor: pointer; }
.hero-image {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.3s;
}
.hero.has-image .hero-image { opacity: 1; }
.hero.has-image > svg:first-child { opacity: 0.25; }
.hero.dz-over {
  box-shadow: inset 0 -30px 60px rgba(10,8,5,0.9), inset 0 0 0 2px var(--gold);
}
.hero-hint {
  position: absolute;
  bottom: 8px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.32em;
  color: var(--parchment-faint);
  text-transform: uppercase;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  z-index: 3;
  pointer-events: none;
  background: rgba(10,8,5,0.7);
  padding: 4px 12px;
  border: 1px solid rgba(138,109,43,0.3);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
}
.hero:hover .hero-hint { opacity: 1; }
.hero-clear {
  position: absolute;
  top: 8px; right: 8px;
  width: 26px; height: 26px;
  border: 1px solid var(--gold-deep);
  background: rgba(10,8,5,0.75);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  z-index: 3;
  border-radius: 0;
  padding: 0;
}
.hero.has-image:not(.has-default) .hero-clear { display: flex; }
.hero-clear:hover { border-color: var(--gold); color: var(--gold-bright); background: rgba(10,8,5,0.95); }

/* ─── Progress (rune tiles) ─── */
.prog { display: flex; gap: 8px; align-items: center; margin-bottom: 22px; padding: 0 4px; }
.rune-tile {
  flex: 1;
  height: 28px;
  border: 1px solid #3a2e1a;
  background: #0c0805;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--parchment-faint);
  transition: all 0.4s;
  position: relative;
}
.rune-tile.active {
  background: linear-gradient(180deg, rgba(201,161,74,0.20), rgba(138,109,43,0.10));
  border-color: var(--gold);
  color: var(--gold-bright);
  box-shadow: inset 0 0 14px rgba(201,161,74,0.25), 0 0 10px rgba(201,161,74,0.18);
  text-shadow: 0 0 8px rgba(240,212,137,0.5);
}
.rune-tile.current { animation: tilePulse 1.8s ease-in-out infinite; }
@keyframes tilePulse {
  0%,100% { box-shadow: inset 0 0 14px rgba(201,161,74,0.25), 0 0 10px rgba(201,161,74,0.18); }
  50%     { box-shadow: inset 0 0 22px rgba(201,161,74,0.45), 0 0 22px rgba(201,161,74,0.35); }
}

/* ─── Question card ─── */
.q-tag {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(138,109,43,0.35);
  padding-bottom: 12px;
}
.peaks-row { display: inline-flex; gap: 3px; align-items: flex-end; height: 12px; }
.peaks-row svg { display: block; }
.peak-on { color: var(--gold-bright); filter: drop-shadow(0 0 4px rgba(240,212,137,0.5)); }
.peak-off { color: #2a2014; }

.q-text {
  font-family: 'IM Fell English', serif;
  font-size: 22px;
  line-height: 1.5;
  color: var(--parchment);
  letter-spacing: 0.01em;
}
/* illuminated drop-cap */
.q-text::first-letter {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 56px;
  float: left;
  line-height: 0.85;
  padding: 6px 10px 0 0;
  color: var(--gold-bright);
  text-shadow: 0 0 16px rgba(240,212,137,0.4);
}

/* ─── Options ─── */
.opts { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.opt {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border: 1px solid #3a2e1a;
  background: linear-gradient(180deg, rgba(28,22,16,0.85), rgba(20,15,9,0.9));
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 0.22s;
  color: var(--parchment);
  font-family: 'IM Fell English', serif;
  font-size: 17px;
  letter-spacing: 0.01em;
  position: relative;
}
.opt:hover:not(:disabled) {
  border-color: var(--gold);
  background: linear-gradient(180deg, rgba(34,26,16,0.95), rgba(26,20,12,0.95));
  box-shadow: 0 0 16px rgba(201,161,74,0.18);
}
.opt:disabled { cursor: default; }
.opt.correct {
  background: linear-gradient(180deg, rgba(74,138,72,0.20), rgba(74,138,72,0.06));
  border-color: var(--forest);
  color: var(--forest-glow);
  box-shadow: 0 0 20px rgba(74,138,72,0.25);
}
.opt.wrong {
  background: linear-gradient(180deg, rgba(168,56,40,0.20), rgba(168,56,40,0.06));
  border-color: var(--crimson);
  color: var(--crimson-glow);
  box-shadow: 0 0 20px rgba(168,56,40,0.25);
}
.opt.dim { opacity: 0.32; }

.badge {
  min-width: 32px; height: 32px;
  border: 1px solid var(--gold-deep);
  background: rgba(201,161,74,0.08);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  flex-shrink: 0;
  letter-spacing: 0;
}
.opt.correct .badge { border-color: var(--forest); color: var(--forest-glow); background: rgba(74,138,72,0.12); }
.opt.wrong .badge   { border-color: var(--crimson); color: var(--crimson-glow); background: rgba(168,56,40,0.12); }

/* ─── Snark ─── */
.snark {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 15px;
  text-align: center;
  margin-top: 20px;
  line-height: 1.5;
  letter-spacing: 0.01em;
  padding: 0 8px;
}
.snark.good { color: var(--forest-glow); }
.snark.bad { color: var(--crimson-glow); }
.snark::before, .snark::after { content: ""; display: inline-block; width: 22px; height: 1px; background: currentColor; opacity: 0.45; vertical-align: middle; margin: 0 12px; }

.tally {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.30em;
  color: var(--parchment-dim);
  text-transform: uppercase;
  margin-top: 20px;
}
.tally-num { color: var(--gold-bright); font-weight: 700; font-size: 13px; }
.tally-sword { color: var(--gold); margin-right: 4px; }

/* ─── Score reveal ─── */
.score-frame {
  position: relative;
  width: 220px; height: 220px;
  margin: 12px auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.score-frame > svg { position: absolute; inset: 0; }
.score-stack { position: relative; z-index: 2; text-align: center; }
.score-big {
  font-family: 'Cinzel', serif;
  font-size: 90px;
  font-weight: 700;
  color: var(--gold-bright);
  line-height: 1;
  text-shadow: 0 0 32px rgba(240,212,137,0.55), 0 0 4px rgba(240,212,137,0.8);
}
.score-denom {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  color: var(--gold-deep);
  letter-spacing: 0.1em;
}
.score-of {
  display: block;
  font-family: 'IM Fell English SC', 'Cinzel', serif;
  font-size: 11px;
  color: var(--parchment-faint);
  letter-spacing: 0.30em;
  text-transform: uppercase;
  margin-top: 6px;
}

.date-banner {
  font-family: 'IM Fell English SC', 'Cinzel', serif;
  font-size: 11px;
  color: var(--parchment-faint);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 4px;
}

.score-msg {
  font-family: 'IM Fell English', serif;
  font-size: 16px;
  color: var(--parchment-2);
  font-style: italic;
  margin-top: 16px;
  line-height: 1.6;
  text-align: center;
  padding: 0 12px;
}
.score-msg::before { content: "“"; color: var(--gold-deep); margin-right: 2px; font-size: 24px; vertical-align: -6px; font-style: normal; }
.score-msg::after  { content: "”"; color: var(--gold-deep); margin-left: 2px; font-size: 24px; vertical-align: -6px; font-style: normal; }

.emojis {
  display: flex; justify-content: center; gap: 8px; margin-top: 22px;
  padding: 12px;
  border-top: 1px solid rgba(138,109,43,0.35);
  border-bottom: 1px solid rgba(138,109,43,0.35);
}
.emoji-cell {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid #3a2e1a;
  background: #0c0805;
}
.emoji-cell.win  { color: var(--forest-glow);  border-color: var(--forest);  box-shadow: inset 0 0 8px rgba(74,138,72,0.2); }
.emoji-cell.loss { color: var(--crimson-glow); border-color: var(--crimson); box-shadow: inset 0 0 8px rgba(168,56,40,0.2); }
.emoji-cell svg { display: block; }

.copy-btn {
  background: none;
  border: 1px solid #3a2e1a;
  border-radius: 3px;
  padding: 12px 24px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.28em;
  color: var(--parchment-dim);
  cursor: pointer;
  margin: 22px auto 0;
  display: block;
  text-transform: uppercase;
  transition: all 0.15s;
}
.copy-btn:hover { border-color: var(--gold); color: var(--gold-bright); }

/* ─── Leaderboard ─── */
.lb-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.34em;
  text-align: center;
  margin-bottom: 18px;
  text-transform: uppercase;
}
.lb-title::before, .lb-title::after {
  content: ""; display: inline-block;
  width: 28px; height: 1px;
  background: var(--gold-deep);
  vertical-align: middle;
  margin: 0 14px;
}
.lb-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  margin-bottom: 6px;
  border: 1px solid transparent;
  font-family: 'IM Fell English', serif;
  font-size: 17px;
  transition: background 0.2s;
}
.lb-row:not(.me) { border-bottom: 1px solid rgba(138,109,43,0.18); }
.lb-row.me {
  background: linear-gradient(90deg, rgba(201,161,74,0.04), rgba(201,161,74,0.15), rgba(201,161,74,0.04));
  border: 1px solid rgba(201,161,74,0.4);
  box-shadow: 0 0 18px rgba(201,161,74,0.1);
}
.lb-left { display: flex; align-items: center; gap: 14px; }
.lb-rank {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.05em;
  min-width: 32px;
  text-align: center;
}
.lb-rank.medal { font-size: 18px; color: var(--gold-bright); text-shadow: 0 0 8px rgba(240,212,137,0.4); }
.lb-name { color: var(--parchment); letter-spacing: 0.02em; }
.lb-you { font-style: italic; color: var(--gold-deep); font-size: 13px; margin-left: 4px; }
.lb-score {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 16px;
  color: var(--parchment);
  letter-spacing: 0.06em;
}
.lb-score.perfect { color: var(--gold-bright); text-shadow: 0 0 14px rgba(240,212,137,0.5); }

/* ─── Footer ─── */
.footer {
  text-align: center;
  font-style: italic;
  font-size: 13px;
  color: var(--parchment-faint);
  margin-top: 24px;
  line-height: 1.6;
}
.footer .small-flourish {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 10px;
  color: var(--gold-deep);
}
.footer .small-flourish::before, .footer .small-flourish::after {
  content: ""; width: 36px; height: 1px; background: currentColor; opacity: 0.5;
}

.center-note { text-align: center; color: var(--parchment-dim); font-style: italic; padding: 1.25rem 0; font-size: 15px; }

/* ─── Two-player name picker ─── */
.player-select { display: flex; gap: 14px; margin-top: 4px; }
.player-btn {
  flex: 1;
  padding: 22px 10px 18px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border: 1px solid var(--gold-deep);
  background: linear-gradient(180deg, rgba(201,161,74,0.04), rgba(201,161,74,0.10));
  color: var(--gold-bright);
  cursor: pointer;
  transition: all 0.22s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.player-btn:hover {
  border-color: var(--gold);
  background: linear-gradient(180deg, rgba(201,161,74,0.12), rgba(201,161,74,0.22));
  box-shadow: 0 0 28px rgba(201,161,74,0.25);
}
.player-btn-name { font-size: 24px; letter-spacing: 0.10em; }
.player-btn-sub  { font-family: 'IM Fell English', serif; font-size: 12px; color: var(--parchment-faint); font-style: italic; font-weight: normal; letter-spacing: 0; text-transform: none; }

/* ─── Reset / play-again link ─── */
.reset-link {
  display: block; text-align: center;
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--parchment-faint);
  cursor: pointer;
  margin-top: 18px;
  opacity: 0.6;
  transition: opacity 0.15s;
  background: none; border: none; padding: 0;
}
.reset-link:hover { opacity: 1; color: var(--gold); }

/* Mini landscape (above quiz/score screens, smaller) */
.mini-landscape {
  position: relative;
  height: 80px;
  margin: 0 -8px 16px;
  overflow: hidden;
  opacity: 0.85;
  border-radius: 2px;
  box-shadow: inset 0 -20px 30px rgba(10,8,5,0.95);
}
.mini-landscape svg { width: 100%; height: 100%; display: block; }

/* ─── Done-screen photo banner (varies by score tier) ─── */
.done-banner {
  position: relative;
  height: 160px;
  margin: 0 -1.5rem 1.5rem;   /* flush to card edges horizontally, sits at card top */
  overflow: hidden;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border-bottom: 1px solid rgba(138,109,43,0.45);
  box-shadow:
    inset 0 -50px 80px rgba(10,8,5,0.95),
    inset 0 30px 60px rgba(10,8,5,0.6);
}
.done-banner::after {
  /* heavy bottom vignette so the score numerals read clearly below */
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,8,5,0.15) 0%, rgba(10,8,5,0.5) 60%, rgba(10,8,5,1) 100%);
  pointer-events: none;
}
.done-banner.tier-high { background-image: url("./done-argonath.jpg"); background-position: center 25%; }
.done-banner.tier-mid  { background-image: url("./done-moria.jpg"); background-position: center 40%; }
.done-banner.tier-low  { background-image: url("./done-witchking.jpg"); background-position: center 20%; }
/* tier-specific tinting / glow at the bottom edge for mood */
.done-banner.tier-high { box-shadow: inset 0 -50px 80px rgba(10,8,5,0.95), inset 0 30px 60px rgba(10,8,5,0.4), inset 0 -2px 0 rgba(201,161,74,0.4); }
.done-banner.tier-low  { box-shadow: inset 0 -50px 80px rgba(10,8,5,0.95), inset 0 30px 60px rgba(10,8,5,0.6), inset 0 -2px 0 rgba(168,56,40,0.5); }
.done-banner-caption {
  position: absolute; bottom: 8px; left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.34em;
  color: var(--parchment-dim);
  text-transform: uppercase;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  z-index: 2;
}

@media (max-width: 480px) {
  h1 { font-size: 26px; letter-spacing: 0.18em; }

  .q-text::first-letter { font-size: 48px; }
  .hero { height: 180px; }
  .hero-seal { width: 100px; height: 100px; }
}

// ────── Generate atmospheric particles ──────
(function spawnAtmosphere() {
  const stars = document.getElementById("stars");
  // deterministic-ish positions for the starfield
  const starData = [
    [12,8,1],[28,18,0],[42,5,1],[58,22,0],[71,13,1],[85,7,0],[93,25,1],
    [8,38,0],[22,42,1],[36,30,0],[52,40,1],[66,33,0],[78,45,1],[88,38,0],
    [4,55,1],[18,62,0],[32,58,1],[44,72,0],[60,65,1],[74,75,0],[90,68,1],
  ];
  starData.forEach(([x,y,sm], i) => {
    const el = document.createElement("div");
    el.className = "star" + (sm ? " s" : "") + (i % 3 === 0 ? " t" : "");
    el.style.left = x + "vw";
    el.style.top = y + "vh";
    if (i % 3 === 0) el.style.animationDelay = (i * 0.3) + "s";
    stars.appendChild(el);
  });
  const embers = document.getElementById("embers");
  for (let i = 0; i < 7; i++) {
    const e = document.createElement("div");
    e.className = "ember";
    e.style.left = (10 + i * 13 + Math.random() * 6) + "vw";
    e.style.animationDuration = (8 + Math.random() * 6) + "s";
    e.style.animationDelay = (-Math.random() * 10) + "s";
    embers.appendChild(e);
  }
})();
</script>

const TAUNTS = [
  "A child of the Shire would have known that.",
  "Even an Orc could've guessed better.",
  "Saruman is laughing somewhere.",
  "Did you skip the movies AND the books?",
  "Gollum knows more than you, precious.",
  "The Witch-king is unimpressed.",
  "Boromir died for this and you can't even answer it.",
  "A Hobbit lass half your age would scoff.",
  "Sauron just smiled. That's bad.",
  "Treebeard would say this is too hasty… and wrong.",
  "Even Pippin wouldn't have fumbled that one.",
  "Mordor called. They want their dignity back.",
];

const PRAISES = [
  "Well struck, traveller.",
  "Elrond nods in approval.",
  "Galadriel saw this coming.",
  "Gandalf would be proud.",
  "A true student of the Red Book.",
  "Not bad for a Halfling.",
];

const SCORE_MSGS = [
  "Zero. Even the Mouth of Sauron pities you. Go re-watch the extended editions.",
  "One out of five. Bilbo's cousin's gardener could do better, drunk.",
  "Two. You've seen a movie once, haven't you? At a friend's house. While on your phone.",
  "Three. Respectable. You'd survive at least the Council, possibly not the Mines.",
  "Four. A worthy Ranger. Aragorn would buy you a pint at the Prancing Pony.",
  "Five. Flawless. Suspicious, even. Did you cheat? You cheated, didn't you.",
];
const MEDALS = ["✦","✧","✧"];
const LABELS = ["A","B","C","D"];
const ROMAN = ["I","II","III","IV","V"];

const IST_OFFSET_MIN = 330;
const ROLLOVER_HOUR = 19;

function getDateKey() {
  const nowUtcMs = Date.now();
  const shifted = new Date(nowUtcMs + IST_OFFSET_MIN*60*1000 - ROLLOVER_HOUR*3600*1000);
  return `${shifted.getUTCFullYear()}-${String(shifted.getUTCMonth()+1).padStart(2,"0")}-${String(shifted.getUTCDate()).padStart(2,"0")}`;
}

function getPrevDateKey() {
  // same logic but 24 hours earlier — gives the previous game-day key
  const prevUtcMs = Date.now() - 24 * 3600 * 1000;
  const shifted = new Date(prevUtcMs + IST_OFFSET_MIN*60*1000 - ROLLOVER_HOUR*3600*1000);
  return `${shifted.getUTCFullYear()}-${String(shifted.getUTCMonth()+1).padStart(2,"0")}-${String(shifted.getUTCDate()).padStart(2,"0")}`;
}

const PLAYERS = ["Apurve", "Prerna"]; // the two players — hardcoded

function getDailyQuestions() {
  const dk = getDateKey();
  let seed = 0;
  for (let i = 0; i < dk.length; i++) seed = (seed * 31 + dk.charCodeAt(i)) >>> 0;
  let s = seed;
  const rng = () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 0x100000000; };

  const picks = [];
  for (let tier = 1; tier <= 5; tier++) {
    const bucket = ALL_Q.filter(q => q.diff === tier).map(q => ({ ...q, opts: [...q.opts] }));
    for (let i = bucket.length - 1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [bucket[i],bucket[j]]=[bucket[j],bucket[i]]; }
    const chosen = bucket[0];
    const correct = chosen.opts[chosen.a];
    const opts = [...chosen.opts];
    for (let i = opts.length-1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    const taunt = TAUNTS[Math.floor(rng() * TAUNTS.length)];
    const praise = PRAISES[Math.floor(rng() * PRAISES.length)];
    picks.push({ q: chosen.q, opts, a: opts.indexOf(correct), diff: tier, taunt, praise });
  }
  return picks;
}

async function readBin() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).record;
}

async function saveScore(name, score) {
  const record = await readBin();
  const dk = getDateKey();
  if (!record.scores) record.scores = {};
  if (!record.scores[dk]) record.scores[dk] = {};
  record.scores[dk][name] = score;
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
    body: JSON.stringify(record)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return record;
}

const PLAYER_KEY = "lotrquiz_player"; // persists forever in this browser

let state = {
  screen: "name",
  playerName: "",
  waitingFor: "",      // name of the player blocking today's unlock
  questions: getDailyQuestions(),
  qIdx: 0, answers: [], finalAnswers: [],
  selected: null, feedback: false,
  myScore: null, leaderboard: null,
  syncing: false, err: "", copied: false
};

function setState(patch) { Object.assign(state, patch); render(); }

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function flourish() {
  return `<div class="flourish">
    <span class="flourish-line"></span>
    <svg width="80" height="14" aria-hidden="true"><use href="#i-flourish"/></svg>
    <span class="flourish-line"></span>
  </div>`;
}

function corners() {
  return `<span class="corner-tr"></span><span class="corner-bl"></span>
          <span class="card-crown"><svg width="40" height="14"><use href="#i-crown"/></svg></span>`;
}

function heroBlock() {
  return `<div class="hero" id="hero-dz">
    <svg viewBox="0 0 540 220" preserveAspectRatio="xMidYMid slice"><use href="#i-hero"/></svg>
    <div class="hero-image" id="hero-img"></div>
    <svg class="hero-seal" viewBox="0 0 120 120" aria-label="Seal of the Quest"><use href="#i-seal"/></svg>
    <span class="hero-hint">Click or drop an image · your own banner</span>
    <button class="hero-clear" id="hero-clear" title="Remove banner">✕</button>
  </div>`;
}

// ─── Hero image dropzone (localStorage-backed, persists in any browser) ───
// Default fallback: the One Ring photo. User can drop their own to override.
const HERO_KEY = "lotrquiz_hero_image";
const HERO_DEFAULT = "./hero-ring.jpg";
function applyStoredHero(dz, img) {
  const stored = localStorage.getItem(HERO_KEY);
  if (stored) {
    img.style.backgroundImage = `url(${stored})`;
    dz.classList.add("has-image");
    dz.classList.remove("has-default");
  } else {
    img.style.backgroundImage = `url(${HERO_DEFAULT})`;
    dz.classList.add("has-image", "has-default");
  }
}
function downscaleAndStore(file, dz, img) {
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = e => {
    const tmp = new Image();
    tmp.onload = () => {
      const MAX = 1400;
      let w = tmp.width, h = tmp.height;
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX / w, MAX / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(tmp, 0, 0, w, h);
      const dataUrl = c.toDataURL("image/jpeg", 0.82);
      try {
        localStorage.setItem(HERO_KEY, dataUrl);
        applyStoredHero(dz, img);
      } catch(err) {
        alert("Image too large to store. Try a smaller image.");
      }
    };
    tmp.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function wireHero() {
  const dz = document.getElementById("hero-dz");
  const img = document.getElementById("hero-img");
  if (!dz || !img) return;
  applyStoredHero(dz, img);
  dz.addEventListener("click", e => {
    if (e.target.id === "hero-clear") return;
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*";
    inp.onchange = ev => downscaleAndStore(ev.target.files[0], dz, img);
    inp.click();
  });
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("dz-over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("dz-over"));
  dz.addEventListener("drop", e => {
    e.preventDefault();
    dz.classList.remove("dz-over");
    downscaleAndStore(e.dataTransfer.files[0], dz, img);
  });
  const clr = document.getElementById("hero-clear");
  if (clr) clr.addEventListener("click", e => {
    e.stopPropagation();
    localStorage.removeItem(HERO_KEY);
    applyStoredHero(dz, img);
  });
}

function miniLandscape() {
  return `<div class="mini-landscape"><svg viewBox="0 0 540 80" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="mlmist" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(10,8,5,0)"/>
        <stop offset="1" stop-color="rgba(10,8,5,1)"/>
      </linearGradient>
    </defs>
    <path d="M0 60 L60 35 L120 50 L190 22 L250 45 L320 18 L390 42 L450 20 L510 38 L540 30 L540 80 L0 80 Z" fill="#100c08"/>
    <path d="M0 70 L80 50 L160 62 L230 38 L310 58 L390 32 L460 55 L540 42 L540 80 L0 80 Z" fill="#070504"/>
    <rect width="540" height="80" fill="url(#mlmist)"/>
  </svg></div>`;
}

function peaksRow(level) {
  let html = `<span class="peaks-row" aria-label="Difficulty ${level} of 5">`;
  for (let i = 1; i <= 5; i++) {
    html += `<svg width="11" height="11" class="${i<=level?'peak-on':'peak-off'}"><use href="#i-peak"/></svg>`;
  }
  return html + `</span>`;
}

async function handleStart(name) {
  if (!name) return;
  localStorage.setItem(PLAYER_KEY, name);   // remember forever
  setState({ playerName: name, screen: "checking", err: "" });
  try {
    const record = await readBin();
    const dk     = getDateKey();
    const prevDk = getPrevDateKey();
    const today  = record.scores?.[dk]     || {};
    const prev   = record.scores?.[prevDk] || {};

    if (today[name] !== undefined) {
      // Already played today — go straight to results
      const lb = Object.entries(today).map(([nm,sc])=>({name:nm,score:sc})).sort((a,b)=>b.score-a.score);
      setState({ myScore: today[name], leaderboard: lb, screen: "done" });
    } else {
      // Check if both players finished yesterday before unlocking today
      // (skip the gate on day 1 — no previous scores at all)
      const prevHasAny = Object.keys(prev).length > 0;
      const prevComplete = !prevHasAny || PLAYERS.every(p => prev[p] !== undefined);
      if (prevComplete) {
        setState({ screen: "quiz" });
      } else {
        // Find who hasn't played yet
        const missing = PLAYERS.find(p => prev[p] === undefined);
        setState({ screen: "locked", waitingFor: missing });
      }
    }
  } catch(e) {
    setState({ err: "The palantír is clouded — check your connection.", screen: "name" });
  }
}

function handleAnswer(idx) {
  if (state.feedback) return;
  const correct = idx === state.questions[state.qIdx].a;
  const newAnswers = [...state.answers, correct];
  setState({ selected: idx, feedback: true, answers: newAnswers });
  setTimeout(async () => {
    if (state.qIdx < 4) {
      setState({ qIdx: state.qIdx+1, selected: null, feedback: false });
    } else {
      const score = newAnswers.filter(Boolean).length;
      setState({ myScore: score, finalAnswers: newAnswers, screen: "done", syncing: true });
      try {
        const updated = await saveScore(state.playerName, score);
        const dk = getDateKey();
        const today = updated.scores?.[dk] || {};
        const lb = Object.entries(today).map(([nm,sc])=>({name:nm,score:sc})).sort((a,b)=>b.score-a.score);
        setState({ leaderboard: lb, syncing: false });
      } catch(e) {
        setState({ syncing: false, err: "Score recorded, but the chronicle failed to sync." });
      }
    }
  }, 2200);
}

async function copyResult() {
  const d = new Date();
  const ds = d.toLocaleDateString("en-GB", { day:"numeric", month:"short" });
  const emojis = state.finalAnswers.map(c => c?"⚔":"☠").join(" ");
  const text = `❖ The Daily Quest · ${ds}\n${state.playerName}: ${state.myScore}/5\n${emojis}`;
  try {
    await navigator.clipboard.writeText(text);
    setState({ copied: true });
    setTimeout(() => setState({ copied: false }), 2500);
  } catch(e) {}
}

function render() {
  const app = document.getElementById("app");
  const s = state;

  if (s.screen === "name" || s.screen === "checking") {
    app.innerHTML = `
      ${heroBlock()}
      <div class="title-block">
        <h1>The Daily Quest</h1>
        <p class="sub">Five questions of Middle-earth · ascending in peril<br/>a new quest rises at dusk (7 PM IST)</p>
      </div>
      ${flourish()}
      <div class="card">
        ${corners()}
        ${s.screen === "checking"
          ? `<p class="center-note">Consulting the palantír…</p>`
          : `<label>Who answers the call?</label>
             ${s.err ? `<p class="err">${escHtml(s.err)}</p>` : ""}
             <div class="player-select">
               <button class="player-btn" id="pb-apurve">
                 <span class="player-btn-name">Apurve</span>
                 <span class="player-btn-sub">The Ranger</span>
               </button>
               <button class="player-btn" id="pb-prerna">
                 <span class="player-btn-name">Prerna</span>
                 <span class="player-btn-sub">The Lore-keeper</span>
               </button>
             </div>
             <p class="hint">Already played today? Tap your name to see the roll.</p>`
        }
      </div>
      `;
    if (s.screen === "name") {
      document.getElementById("pb-apurve").addEventListener("click", () => handleStart("Apurve"));
      document.getElementById("pb-prerna").addEventListener("click", () => handleStart("Prerna"));
    }
    wireHero();
    return;
  }

  if (s.screen === "locked") {
    const other = escHtml(s.waitingFor || "your companion");
    app.innerHTML = `
      ${heroBlock()}
      <div class="title-block">
        <h1>The Daily Quest</h1>
        <p class="sub">Five questions of Middle-earth · ascending in peril<br/>a new quest rises at dusk (7 PM IST)</p>
      </div>
      ${flourish()}
      <div class="card" style="text-align:center;">
        ${corners()}
        <div style="font-size:36px; margin-bottom:16px; filter:drop-shadow(0 0 14px rgba(168,56,40,0.6))">🔒</div>
        <div style="font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.25em; color:var(--gold); text-transform:uppercase; margin-bottom:16px;">The Gates Are Sealed</div>
        <p style="font-family:'IM Fell English',serif; font-size:18px; color:var(--parchment); line-height:1.7; margin-bottom:12px;">
          ${other} has yet to answer yesterday's call.
        </p>
        <p style="font-style:italic; font-size:14px; color:var(--parchment-dim); line-height:1.6;">
          Both companions must complete each day's quest before the next path opens. Check back once ${other} has played.
        </p>
      </div>`;
    wireHero();
    return;
  }

  if (s.screen === "quiz") {
    const q = s.questions[s.qIdx];
    const tiles = [0,1,2,3,4].map(i => {
      let cls = "rune-tile";
      if (i < s.qIdx) cls += " active";
      else if (i === s.qIdx) cls += " active current";
      return `<div class="${cls}">${ROMAN[i]}</div>`;
    }).join("");
    const opts = q.opts.map((opt,i)=>{
      let cls = "opt";
      if (s.feedback) {
        if (i===q.a) cls+=" correct";
        else if (i===s.selected) cls+=" wrong";
        else cls+=" dim";
      }
      return `<button class="${cls}" data-i="${i}" ${s.feedback?"disabled":""}>
        <span class="badge">${LABELS[i]}</span><span>${escHtml(opt)}</span>
      </button>`;
    }).join("");
    const wasCorrect = s.feedback && s.selected === q.a;
    const snarkLine = s.feedback
      ? (wasCorrect
          ? `<p class="snark good">${escHtml(q.praise)}</p>`
          : `<p class="snark bad">${escHtml(q.taunt)}</p>`)
      : "";
    app.innerHTML = `
      ${miniLandscape()}
      <div class="prog">${tiles}</div>
      <div class="card">
        ${corners()}
        <div class="q-tag">
          <span>Trial ${ROMAN[s.qIdx]} of V</span>
          ${peaksRow(q.diff)}
        </div>
        <div class="q-text">${escHtml(q.q)}</div>
      </div>
      <div class="opts">${opts}</div>
      ${snarkLine}
      <p class="tally"><span class="tally-sword">⚔</span><span class="tally-num">${s.answers.filter(Boolean).length}</span> &nbsp;Victories Thus Far</p>`;
    document.querySelectorAll(".opt").forEach(b => b.addEventListener("click", ()=>handleAnswer(+b.dataset.i)));
    return;
  }

  if (s.screen === "done") {
    const msg = SCORE_MSGS[Math.min(s.myScore??0,5)];
    const dateStr = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
    // photo banner that varies by score outcome
    const sc = s.myScore ?? 0;
    let bannerTier = "tier-mid", bannerCap = "Wandering still…";
    if (sc >= 4) { bannerTier = "tier-high"; bannerCap = "The Argonath honours you"; }
    else if (sc <= 1) { bannerTier = "tier-low"; bannerCap = "Shadow takes the unworthy"; }
    const doneBanner = `<div class="done-banner ${bannerTier}" aria-hidden="true">
        <div class="done-banner-caption">${bannerCap}</div>
      </div>`;
    const emojiRow = s.finalAnswers.length>0
      ? `<div class="emojis">${s.finalAnswers.map(c=>`
          <span class="emoji-cell ${c?'win':'loss'}">
            <svg width="22" height="22"><use href="#${c?'i-sword':'i-skull'}"/></svg>
          </span>`).join("")}</div>` : "";

    let lbHtml;
    if (s.syncing || s.leaderboard===null) {
      lbHtml = `<p class="center-note">Inscribing your name in the chronicle…</p>`;
    } else if (!s.leaderboard.length) {
      lbHtml = `<p class="center-note">No names yet recorded today.</p>`;
    } else {
      lbHtml = s.leaderboard.map(({name,score},i)=>{
        const rank = i < 3
          ? `<span class="lb-rank medal">${MEDALS[i]}</span>`
          : `<span class="lb-rank">${ROMAN[i] || (i+1)}</span>`;
        return `
        <div class="lb-row ${name===s.playerName?'me':''}">
          <div class="lb-left">
            ${rank}
            <span class="lb-name">${escHtml(name)}</span>
            ${name===s.playerName?`<span class="lb-you">— you</span>`:""}
          </div>
          <span class="lb-score ${score===5?'perfect':''}">${score} <span style="opacity:0.4">/</span> 5</span>
        </div>`;
      }).join("");
    }

    app.innerHTML = `
      ${miniLandscape()}
      <div class="card" style="text-align:center; padding-top: 0;">
        ${corners()}
        ${doneBanner}
        <div class="date-banner">${dateStr}</div>
        <div class="score-frame">
          <svg viewBox="0 0 220 220"><use href="#i-scoreframe"/></svg>
          <div class="score-stack">
            <span class="score-big">${s.myScore}</span><span class="score-denom">/5</span>
            <span class="score-of">of Five Trials</span>
          </div>
        </div>
        <div class="score-msg">${escHtml(msg)}</div>
        ${emojiRow}
        ${s.finalAnswers.length>0?`<button class="copy-btn" id="cb">${s.copied?"✓ Copied to share":"Copy your tale"}</button>`:""}
      </div>
      <div class="card">
        ${corners()}
        <div class="lb-title">Today's Chronicle</div>
        ${lbHtml}
        ${s.err?`<p class="err" style="margin-top:10px">${escHtml(s.err)}</p>`:""}
      </div>
      <p class="footer">
        A new quest rises with the dusk.<br/>
        <span class="small-flourish"><svg width="80" height="14"><use href="#i-flourish"/></svg></span>
      </p>
`;
    const cb = document.getElementById("cb");
    if (cb) cb.addEventListener("click", copyResult);
  }
}

// ── Boot: if this browser already knows who the player is, skip the picker ──
const _savedPlayer = localStorage.getItem(PLAYER_KEY);
if (_savedPlayer) {
  handleStart(_savedPlayer);   // goes straight to checking → quiz or done
} else {
  render();                    // show the one-time player picker
}
</script>
